<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Download Directory Extension</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <section class="panel">
        <div class="header">
          <div>
            <h1>ダウンロードディレクトリ拡張</h1>
            <p id="status" class="status">OFF</p>
          </div>

          <label class="switch" aria-label="ダウンロードディレクトリ拡張">
            <input id="enabled-toggle" type="checkbox" />
            <span class="slider"></span>
          </label>
        </div>

        <dl class="details">
          <dt>保存先</dt>
          <dd id="directory">通常のダウンロード先</dd>
        </dl>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
